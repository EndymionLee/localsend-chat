name: Build Releases

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;28.0.13004108'

      - name: Install dependencies
        run: |
          cd app
          flutter pub get

      - name: Build APK
        run: |
          cd app
          export RUST_MIN_STACK=16777216
          flutter build apk --release
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-android.outputs.ndk-path }}

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: LocalSendChat-android
          path: app/build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          cd app
          flutter pub get

      - name: Build Windows
        run: |
          cd app
          $env:RUST_MIN_STACK = 16777216
          flutter build windows --release

      - name: Package ZIP
        run: |
          Compress-Archive -Path app\build\windows\x64\runner\Release\* -DestinationPath LocalSendChat-windows.zip

      - name: Upload Windows
        uses: actions/upload-artifact@v7
        with:
          name: LocalSendChat-windows
          path: LocalSendChat-windows.zip
